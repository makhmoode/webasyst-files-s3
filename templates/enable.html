<input type="checkbox" name="files_s3[enable]" class="checkbox" id="s3_files_s3_enable" value="1" {if $enable} checked{/if} />
<script>
$(function() {
    var $settlementField = $('#files-s3-settlement').closest('.field');
    {if !$enable}$settlementField.hide();{/if}
    $('#s3_files_s3_enable').change(function() {
        if ($(this).is(':checked')) {
            $settlementField.slideDown();
        } else {
            $settlementField.slideUp();
        }
    });
});
</script>
